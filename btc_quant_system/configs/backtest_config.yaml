# ═══════════════════════════════════════════════════════════
# BTC Quant Trading System — Backtest Configuration
# ═══════════════════════════════════════════════════════════

simulation:
  slippage_pct: 0.05             # 0.05% slippage
  maker_fee_pct: 0.02            # 0.02% maker fee
  taker_fee_pct: 0.04            # 0.04% taker fee
  fill_probability: 1.0          # 100% fill rate (backtest)
  partial_fills: false

periods:
  train_start: "2015-01-01"
  train_end: "2020-12-31"
  val_start: "2021-01-01"
  val_end: "2022-12-31"
  test_start: "2023-01-01"
  test_end: "2024-12-31"
  live_start: "2025-01-01"

warmup_periods: 200              # Candles needed for longest indicator

reporting:
  save_trades: true
  save_equity_curve: true
  save_drawdown: true
  plot_charts: true
  output_format: ["json", "csv", "html"]

benchmarks:
  - "buy_and_hold"
  - "risk_free_rate"
  risk_free_annual: 0.05         # 5% annual risk-free rate

metrics:
  - "total_return"
  - "cagr"
  - "sharpe_ratio"
  - "sortino_ratio"
  - "max_drawdown"
  - "calmar_ratio"
  - "win_rate"
  - "profit_factor"
  - "avg_trade_duration"
  - "max_consecutive_losses"
